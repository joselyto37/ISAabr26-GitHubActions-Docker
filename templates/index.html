<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jose Luis</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background-color:#2563eb;
            height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;
        }

        .contenedor{
            background:white;
            width:500px;
            padding:40px;
            border-radius:20px;
            text-align:center;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        .emoji{
            font-size:70px;
            margin-bottom:15px;
        }

        h1{
            color:#2563eb;
            margin-bottom:15px;
        }

        p{
            color:#555;
            margin-bottom:25px;
        }

        .boton{
            display:inline-block;
            text-decoration:none;
            background:#2563eb;
            color:white;
            padding:12px 25px;
            border-radius:10px;
        }

        .boton:hover{
            background:#1d4ed8;
        }
    </style>

</head>
<body>

    <div class="contenedor">

        <div class="emoji">🚀</div>

        <h1>Jose Luis</h1>

        <p>
            Bienvenido a mi página web creada con Flask.
        </p>

        <a href="#" class="boton">Ingresar</a>

    </div>

</body>
</html>
